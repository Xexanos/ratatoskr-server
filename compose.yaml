# docker compose deployment for the Ratatoskr server.
#
# Quick start:
#   1. Set ABS_URL and ABS_STREAMER_API_KEY in the `environment:` block below.
#   2. docker compose up -d
#
# Everything is configured in this one file — no separate .env needed. Each variable is documented
# inline; SPEC sections 7 and 14 carry the deeper rationale. Missing or invalid values are reported
# together at startup and the server refuses to run.
#
# With no TLS configured (the default below), the container generates a persistent self-signed
# certificate in ./tls and serves HTTPS. On first connect the app shows the certificate's SHA-256
# fingerprint — match it against the one printed in `docker compose logs`.

services:
  ratatoskr:
    # Change the tag to pin a specific version instead of tracking the latest release.
    image: ghcr.io/xexanos/ratatoskr-server:latest
    container_name: ratatoskr-server
    restart: unless-stopped

    # Processes in the container can never gain privileges via setuid/setgid binaries. The server
    # runs non-root and needs no escalation (the entrypoint is openssl + node only), so this is
    # free hardening — and it satisfies the corresponding TrueNAS security-screen check.
    security_opt:
      - no-new-privileges:true

    # Sonos discovery (SSDP multicast) and UPnP event callbacks need the host LAN stack, so host
    # networking is the robust default for a LAN appliance (SPEC section 12). The server then
    # listens on PORT (default 8080) directly on the host; under host networking `ports:` is
    # ignored. Host networking is a Linux feature — on Docker Desktop it behaves differently, so
    # deploy on a Linux host.
    network_mode: host

    # --- Bridge-networking alternative ---
    # If you cannot use host networking, remove `network_mode: host` above, uncomment the ports,
    # and set SONOS_SEED_HOST (see below) to a speaker IP — multicast SSDP won't cross the bridge,
    # but the topology then loads by a direct unicast call, and outbound control + the speaker
    # fetching audio from ABS still work.
    # ports:
    #   - "8080:8080"

    # Give the graceful-shutdown drain (SPEC section 5) room to write the final position back to
    # ABS before the container is killed — comfortably above SHUTDOWN_TIMEOUT_MS (default 5000).
    stop_grace_period: 15s

    environment:
      # ─────────────────────────── Required — edit these two ───────────────────────────
      # Your Audiobookshelf base URL. Use https:// so credentials and tokens are not sent in
      # cleartext (SPEC section 14); for an http:// URL also uncomment ABS_ALLOW_PLAIN_HTTP below.
      ABS_URL: "https://192.168.1.50:13378"
      # API key of a dedicated, low-privilege, stream-only ABS account (README → "Set up the
      # streamer account"). It is embedded in the media URLs handed to speakers, so it must never
      # be a real listener's account.
      ABS_STREAMER_API_KEY: ""

      # ─────────── Ratatoskr's own listener / TLS (SPEC section 14) — pick ONE ───────────
      # Default (all three below left commented): the container generates a persistent self-signed
      # certificate in ./tls and serves HTTPS; the app trusts it on first connect by the SHA-256
      # fingerprint printed in the logs. Best zero-config option; keeps credentials off the wire.
      #
      # Serve plain HTTP instead (trusted LAN, or TLS terminated by a reverse proxy):
      # ALLOW_PLAIN_HTTP: "true"
      # Or serve HTTPS with your OWN certificate (drop the files in ./tls):
      # TLS_CERT_PATH: "/tls/cert.pem"
      # TLS_KEY_PATH: "/tls/key.pem"

      # ─────────── Audiobookshelf transport (SPEC section 14) ───────────
      # Accept a plain-http ABS_URL (ABS credentials cross the network in cleartext) — trusted LAN only:
      # ABS_ALLOW_PLAIN_HTTP: "true"
      # Trust a self-signed / private-CA ABS certificate — inline PEM OR a mounted path (set one):
      # ABS_CA_CERT: "-----BEGIN CERTIFICATE-----\n...\n-----END CERTIFICATE-----"
      # ABS_CA_CERT_PATH: "/tls/abs-ca.pem"
      # Disable ABS cert verification entirely (MITM-vulnerable; last resort, excludes ABS_CA_CERT*):
      # ABS_TLS_INSECURE: "true"
      # ABS_REQUEST_TIMEOUT_MS: "10000"                 # per-request cap on ABS HTTP calls so a hung
      #                                                 # ABS fails fast (502) instead of stalling

      # ─────────── Sonos ───────────
      # A speaker's IP. Only needed where SSDP multicast is unreliable (or under bridge networking);
      # discovery is automatic otherwise.
      # SONOS_SEED_HOST: "192.168.1.60"
      # SONOS_REQUEST_TIMEOUT_MS: "4000"                # per-call cap on Sonos SOAP/discovery I/O so a
      #                                                 # vanished speaker fails fast (502) instead of hanging

      # ─────────── Listener port ───────────
      # PORT: "8080"

      # ─────────── Optional tuning (defaults shown; uncomment to change) ───────────
      # POLL_INTERVAL_SECONDS: "15"                     # how often the sync loop polls speaker position
      # SEEK_SETTLE_MS: "1000"                          # settle delay after a seek before verifying
      # SEEK_TOLERANCE_SECONDS: "3"                     # acceptable post-seek position error
      # SEEK_RETRIES: "2"                               # seek retry attempts
      # PROGRESS_WRITE_THRESHOLD_SECONDS: "5"           # min movement before writing progress to ABS
      # RESUME_REWIND_SECONDS: "10"                     # rewind this far when resuming a book (SPEC §5)
      # WRITE_POSITION_BACKOFF_SECONDS: "2"             # settle window before writing a reached position back (SPEC §5)
      # LISTENING_TOKEN_REFRESH_MARGIN_SECONDS: "300"   # renew the ABS token this long before it expires
      # SHUTDOWN_TIMEOUT_MS: "5000"                     # upper bound on the graceful-shutdown drain
      # VALIDATE_RESPONSES: "true"                      # off by default; dev/staging aid, validates every response against the contract (per-response overhead)

    # ./tls persists the auto-generated self-signed certificate across restarts (so the app's pinned
    # fingerprint stays valid), and is also where you drop your OWN cert.pem/key.pem or an ABS CA PEM
    # if you set the *_PATH variables above. The container runs as uid 1000, so this directory must
    # be writable by it: on Linux, create it first with `mkdir -p tls` (or `chown 1000:1000 tls` if
    # it already exists root-owned). Prefer a named volume instead? Replace the line below with
    # `- ratatoskr-tls:/tls` and add a top-level `volumes: { ratatoskr-tls: {} }` — it inherits
    # writable ownership automatically, at the cost of the cert being less easy to inspect.
    volumes:
      - ./tls:/tls
