version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      # vitest and @vitest/* release in lockstep (@vitest/coverage-v8 pins the exact vitest
      # version), so they must always be bumped together — including majors, which is why this
      # group has no update-types restriction. Listed before minor-and-patch so it wins for
      # these packages.
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
