name: Container image

# Builds the multi-arch server image (SPEC section 12) and publishes it to GHCR as
# `testing-<short-sha>` — the artifact the central E2E stack (Xexanos/ratatoskr-e2e)
# pulls to run the full app + server + ABS + fake-Sonos suite. After pushing, it hands
# the exact image ref to the E2E repo via repository_dispatch. Promotion of a *tested*
# image to a release channel is a separate, no-rebuild step (see promote.yml).
#
# - pull_request : build both arches as a bitrot guard; never pushes (fork PRs have no
#                  registry write anyway). Path-filtered so docs-only PRs skip the dual-arch
#                  QEMU build. NOTE: if this job is ever made a required status check, a
#                  path-filtered workflow that doesn't run leaves the check pending and blocks
#                  the PR — pair it with a bridging "always-green" job or GitHub's merge rules.
# - push to main : build + push `testing-<sha>` and trigger the E2E suite.
# - workflow_dispatch : same, on demand for any branch (use this to hand the current
#                  feature branch to E2E before it is merged).

on:
  push:
    branches: [main]
  pull_request:
    # Only the inputs that affect the image; a pure-docs PR doesn't need the QEMU build.
    # fake-sonos sources never enter the server image (the Dockerfile copies only its
    # package.json, for the pnpm-install layer) and have their own build in fake-sonos.yml — so
    # exclude them here to avoid a redundant server build on fake-only PRs, but re-include the
    # package.json the server build does consume.
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - .dockerignore
      - packages/**
      - '!packages/fake-sonos/**'
      - packages/fake-sonos/package.json
      - contract/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/container.yml
  workflow_dispatch:
    inputs:
      trigger_e2e:
        description: Dispatch the E2E suite after pushing the image
        type: boolean
        default: true

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires a lowercase path; the owner (Xexanos) is mixed-case, so metadata-action
  # lowercases it for the tags below, and the dispatch job lowercases it explicitly.
  IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
      tag: ${{ steps.image.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute the testing tag
        id: image
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          image="${REGISTRY}/${IMAGE_NAME,,}"
          echo "tag=testing-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "ref=${image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      # No registry write on pull_request (esp. fork PRs) — that leg only validates the build.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # One tag per build: testing-<short-sha>. It already uniquely identifies the commit, and
          # metadata-action stamps the full commit into the org.opencontainers.image.revision label,
          # so a second sha-<full-sha> tag would add clutter (and a second thing to prune) with no
          # benefit — promotion addresses the tested image by digest, not by a sha tag.
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the manifest list clean (no extra attestation entries) so the E2E stack can
          # pull it by tag or digest without surprises.
          provenance: false
          sbom: false

  # Hand the freshly pushed image to the central E2E repo. Cross-repo dispatch needs a token
  # with access to Xexanos/ratatoskr-e2e (the per-run GITHUB_TOKEN is scoped to THIS repo only),
  # stored as the E2E_DISPATCH_TOKEN secret. If that secret is missing the job FAILS: the image is
  # published but its E2E gate silently not running would be worse than a red pipeline.
  trigger-e2e:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.trigger_e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the E2E suite
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          IMAGE: ${{ needs.build.outputs.image }}
          TAG: ${{ needs.build.outputs.tag }}
          DIGEST: ${{ needs.build.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$E2E_DISPATCH_TOKEN" ]; then
            echo "::error title=E2E dispatch failed::E2E_DISPATCH_TOKEN is not set — cannot trigger the E2E suite for ${IMAGE}:${TAG}. Add the secret (see docs/deploy.md)." >&2
            exit 1
          fi
          echo "Dispatching E2E for ${IMAGE}:${TAG} (${DIGEST})"
          GH_TOKEN="$E2E_DISPATCH_TOKEN" gh api \
            repos/${{ github.repository_owner }}/ratatoskr-e2e/dispatches \
            -f event_type=server-image \
            -F client_payload[image]="$IMAGE" \
            -F client_payload[tag]="$TAG" \
            -F client_payload[digest]="$DIGEST" \
            -F client_payload[sha]="$SHA"
