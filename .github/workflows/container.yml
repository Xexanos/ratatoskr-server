name: Container image

# Builds the multi-arch server image (SPEC section 12) and publishes it to GHCR as
# `testing-<short-sha>` — the artifact the central E2E stack (Xexanos/ratatoskr-e2e)
# pulls to run the full app + server + ABS + fake-Sonos suite. It also publishes the fake Sonos
# double (packages/fake-sonos) with the same tags, so the E2E stack pulls the fake matching the
# server commit under test. After pushing, it hands the exact image ref to the E2E repo via
# repository_dispatch. Promotion of a *tested* image to a release channel is a separate,
# no-rebuild step (see promote.yml).
#
# - pull_request : build both arches as a bitrot guard; never pushes (fork PRs have no
#                  registry write anyway).
# - push to main : build + push `testing-<sha>` and trigger the E2E suite.
# - workflow_dispatch : same, on demand for any branch (use this to hand the current
#                  feature branch to E2E before it is merged).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      trigger_e2e:
        description: Dispatch the E2E suite after pushing the image
        type: boolean
        default: true

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires a lowercase path; the owner (Xexanos) is mixed-case, so metadata-action
  # lowercases it for the tags below, and the dispatch job lowercases it explicitly.
  IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server
  # The fake Sonos double lives in this repo (packages/fake-sonos) and is published alongside
  # the server with the SAME tags, so the central E2E stack can pull the fake matching the exact
  # commit under test (sha-<sha>). Consumed by Xexanos/ratatoskr-e2e; not a user-facing artifact.
  FAKE_IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-fake-sonos

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
      tag: ${{ steps.image.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute the testing tag
        id: image
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          image="${REGISTRY}/${IMAGE_NAME,,}"
          echo "tag=testing-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "ref=${image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # No registry write on pull_request (esp. fork PRs) — that leg only validates the build.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}
            type=sha,format=long

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the manifest list clean (no extra attestation entries) so the E2E stack can
          # pull it by tag or digest without surprises.
          provenance: false
          sbom: false

      # Publish the fake Sonos double alongside the server, with the SAME tags (testing-<sha> +
      # sha-<full-sha>). The E2E repo derives its ref from the dispatched sha (sha-<sha>), so the
      # fake always matches the server commit under test. Its Dockerfile builds from the repo root.
      - name: Fake Sonos image metadata
        id: meta-fake
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FAKE_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}
            type=sha,format=long

      - name: Build and push the fake Sonos
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/fake-sonos/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-fake.outputs.tags }}
          labels: ${{ steps.meta-fake.outputs.labels }}
          # Separate cache scope so it doesn't collide with the server image's layers.
          cache-from: type=gha,scope=fake-sonos
          cache-to: type=gha,mode=max,scope=fake-sonos
          provenance: false
          sbom: false

  # Hand the freshly pushed image to the central E2E repo. Cross-repo dispatch needs a token
  # with access to Xexanos/ratatoskr-e2e (the per-run GITHUB_TOKEN is scoped to THIS repo only),
  # stored as the E2E_DISPATCH_TOKEN secret. When that secret is absent the step no-ops with a
  # notice, so the image is still published and can be consumed manually.
  trigger-e2e:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.trigger_e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the E2E suite
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          IMAGE: ${{ needs.build.outputs.image }}
          TAG: ${{ needs.build.outputs.tag }}
          DIGEST: ${{ needs.build.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$E2E_DISPATCH_TOKEN" ]; then
            echo "::notice title=E2E not triggered::E2E_DISPATCH_TOKEN is not set; published ${IMAGE}:${TAG} but did not dispatch the E2E suite."
            exit 0
          fi
          echo "Dispatching E2E for ${IMAGE}:${TAG} (${DIGEST})"
          GH_TOKEN="$E2E_DISPATCH_TOKEN" gh api \
            repos/${{ github.repository_owner }}/ratatoskr-e2e/dispatches \
            -f event_type=server-image \
            -F client_payload[image]="$IMAGE" \
            -F client_payload[tag]="$TAG" \
            -F client_payload[digest]="$DIGEST" \
            -F client_payload[sha]="$SHA"
