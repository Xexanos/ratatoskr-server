name: Container image

# Builds the multi-arch server image (SPEC section 12) and publishes it to the private
# `ratatoskr-server-testing` package as `testing-<short-sha>` — the artifact the central E2E
# stack (Xexanos/ratatoskr-e2e) pulls to run the full app + server + ABS + fake-Sonos suite.
# After pushing, it hands the exact image ref to the E2E repo via repository_dispatch.
# Promotion of a *tested* image is a separate, no-rebuild step that copies the tested digest
# into the PUBLIC release package `ratatoskr-server` (see promote.yml) — so throwaway per-commit
# images stay in the private testing package and never surface publicly.
#
# - pull_request : build both arches as a bitrot guard; never pushes (fork PRs have no
#                  registry write anyway). Path-filtered so docs-only PRs skip the dual-arch
#                  QEMU build. NOTE: if this job is ever made a required status check, a
#                  path-filtered workflow that doesn't run leaves the check pending and blocks
#                  the PR — pair it with a bridging "always-green" job or GitHub's merge rules.
# - push to main : build + push `testing-<sha>` and trigger the E2E suite.
# - workflow_dispatch : same, on demand for any branch (use this to hand the current
#                  feature branch to E2E before it is merged).

on:
  push:
    branches: [main]
  pull_request:
    # Only the inputs that affect the image; a pure-docs PR doesn't need the QEMU build.
    # fake-sonos sources never enter the server image (the Dockerfile copies only its
    # package.json, for the pnpm-install layer) and have their own build in fake-sonos.yml — so
    # exclude them here to avoid a redundant server build on fake-only PRs, but re-include the
    # package.json the server build does consume.
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - .dockerignore
      - packages/**
      - '!packages/fake-sonos/**'
      - packages/fake-sonos/package.json
      - contract/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/container.yml
  workflow_dispatch:
    inputs:
      trigger_e2e:
        description: Dispatch the E2E suite after pushing the image
        type: boolean
        default: true

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Testing builds go to a SEPARATE, private package (ratatoskr-server-testing). promote.yml
  # copies the tested digest into the public release package (ratatoskr-server), so throwaway
  # per-commit images never appear in the public release package.
  # GHCR requires a lowercase path; the owner (Xexanos) is mixed-case, so metadata-action
  # lowercases it for the tags below, and the dispatch job lowercases it explicitly.
  IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server-testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
      tag: ${{ steps.image.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute the testing tag
        id: image
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          image="${REGISTRY}/${IMAGE_NAME,,}"
          echo "tag=testing-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "ref=${image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # No registry write on pull_request (esp. fork PRs) — that leg only validates the build.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # One tag per build: testing-<short-sha>. It already uniquely identifies the commit, and
          # metadata-action stamps the full commit into the org.opencontainers.image.revision label,
          # so a second sha-<full-sha> tag would add clutter (and a second thing to prune) with no
          # benefit — promotion addresses the tested image by digest, not by a sha tag.
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the manifest list clean (no extra attestation entries) so the E2E stack can
          # pull it by tag or digest without surprises.
          provenance: false
          sbom: false

  # Native arm64 boot check. The build cross-compiles on an amd64 builder (Dockerfile's
  # `--platform=$BUILDPLATFORM` build stage), so a wrong-arch artifact would only surface at runtime
  # on real hardware. Run on a native arm64 runner (free for public repos) and prove the arm64 image
  # actually boots and serves /v1/health before it can be promoted. The Dockerfile's *.node guard is
  # the deterministic tripwire that fails the moment a native dep is introduced; this is the
  # behavioural backstop that also covers musl/alpine and runtime-arch surprises the guard can't see.
  # On push/dispatch it tests the EXACT multi-arch image just pushed (pull by digest → native arm64
  # picks the arm64 variant); on a PR nothing was pushed, so it builds the arm64 image locally.
  smoke-arm64:
    needs: build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve the arm64 image to test
        id: img
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            docker build -t ratatoskr-server:arm64-smoke .   # native arm64 build; nothing was pushed
            echo "ref=ratatoskr-server:arm64-smoke" >> "$GITHUB_OUTPUT"
          else
            docker pull "${IMAGE}@${DIGEST}"                 # the exact pushed artifact, arm64 variant
            echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"
          fi
      - name: Boot the arm64 image and assert /v1/health responds
        env:
          REF: ${{ steps.img.outputs.ref }}
        run: |
          # Plain HTTP (no cert to manage) + an unreachable ABS (connection refused is a network
          # error, which the server tolerates at startup — it degrades and /health reports it). If a
          # dependency is broken on arm64, Node fails to load it and the listener never comes up.
          docker run -d --name smoke \
            -e ALLOW_PLAIN_HTTP=true \
            -e ABS_URL=http://127.0.0.1:1 -e ABS_ALLOW_PLAIN_HTTP=true \
            -e ABS_STREAMER_API_KEY=smoke-dummy \
            -e PORT=8080 -p 8080:8080 "$REF"
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/v1/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          echo "--- container logs ---"; docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          [ -n "$ok" ] || { echo "::error title=arm64 smoke failed::the arm64 image did not serve /v1/health"; exit 1; }

  # Hand the freshly pushed image to the central E2E repo. Cross-repo dispatch needs a token
  # with access to Xexanos/ratatoskr-e2e (the per-run GITHUB_TOKEN is scoped to THIS repo only),
  # stored as the E2E_DISPATCH_TOKEN secret. If that secret is missing the job FAILS: the image is
  # published but its E2E gate silently not running would be worse than a red pipeline.
  # Gated on smoke-arm64 too: a pushed image that can't boot on arm64 must not reach the E2E → promote
  # path, so a broken arm64 build is never promoted to a release channel.
  trigger-e2e:
    needs: [build, smoke-arm64]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.trigger_e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the E2E suite
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          IMAGE: ${{ needs.build.outputs.image }}
          TAG: ${{ needs.build.outputs.tag }}
          DIGEST: ${{ needs.build.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$E2E_DISPATCH_TOKEN" ]; then
            echo "::error title=E2E dispatch failed::E2E_DISPATCH_TOKEN is not set — cannot trigger the E2E suite for ${IMAGE}:${TAG}. Add the secret (see docs/deploy.md)." >&2
            exit 1
          fi
          echo "Dispatching E2E for ${IMAGE}:${TAG} (${DIGEST})"
          GH_TOKEN="$E2E_DISPATCH_TOKEN" gh api \
            repos/${{ github.repository_owner }}/ratatoskr-e2e/dispatches \
            -f event_type=server-image \
            -F client_payload[image]="$IMAGE" \
            -F client_payload[tag]="$TAG" \
            -F client_payload[digest]="$DIGEST" \
            -F client_payload[sha]="$SHA"
