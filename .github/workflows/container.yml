name: Container image

# Builds the multi-arch server image (SPEC section 12) and publishes it to the private
# `ratatoskr-server-testing` package as `testing-<short-sha>` — the artifact the central E2E
# stack (Xexanos/ratatoskr-e2e) pulls to run the full app + server + ABS + fake-Sonos suite.
# After pushing, it hands the exact image ref to the E2E repo via repository_dispatch.
# Promotion of a *tested* image is a separate, no-rebuild step that copies the tested digest
# into the PUBLIC release package `ratatoskr-server` (see promote.yml) — so throwaway per-commit
# images stay in the private testing package and never surface publicly.
#
# Multi-arch WITHOUT QEMU: each architecture is built on its OWN native runner (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm — free for public repos) as a matrix, then a merge job
# stitches the per-arch images into one manifest list. This avoids emulating the toolchain (pnpm
# install + tsc under QEMU is minutes-slow and has hung the runner outright), and — because each
# arch is built natively — a native/arch-specific dependency is compiled correctly for its target
# instead of being cross-shipped wrong, so there is no arch-independence assumption to guard.
#
# - pull_request : build EACH arch natively (matrix) as a bitrot guard and boot-smoke each image;
#                  never pushes (fork PRs have no registry write anyway). Path-filtered so a
#                  docs-only PR skips the build. NOTE: if this job is ever made a required status
#                  check, a path-filtered workflow that doesn't run leaves the check pending and
#                  blocks the PR — pair it with a bridging "always-green" job or GitHub's merge rules.
# - push to main : build + push each arch by digest, merge into `testing-<sha>`, trigger the E2E suite.
# - workflow_dispatch : same, on demand for any branch (use this to hand the current feature branch
#                  to E2E before it is merged; set trigger_e2e=false to only build + publish).

on:
  push:
    branches: [main]
  pull_request:
    # Only the inputs that affect the image; a pure-docs PR doesn't need the build.
    # fake-sonos sources never enter the server image (the Dockerfile copies only its
    # package.json, for the pnpm-install layer) and have their own build in fake-sonos.yml — so
    # exclude them here to avoid a redundant server build on fake-only PRs, but re-include the
    # package.json the server build does consume.
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - .dockerignore
      - packages/**
      - '!packages/fake-sonos/**'
      - packages/fake-sonos/package.json
      - contract/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/container.yml
  workflow_dispatch:
    inputs:
      trigger_e2e:
        description: Dispatch the E2E suite after pushing the image
        type: boolean
        default: true

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Testing builds go to a SEPARATE, private package (ratatoskr-server-testing). promote.yml
  # copies the tested digest into the public release package (ratatoskr-server), so throwaway
  # per-commit images never appear in the public release package.
  # GHCR requires a lowercase path; the owner (Xexanos) is mixed-case, so the jobs below lowercase
  # it explicitly (${IMAGE_NAME,,}) wherever a pull/push ref is formed.
  IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server-testing

jobs:
  # One native build per architecture. Each pushes its single-arch image BY DIGEST (no per-arch
  # tag — the tag is applied once, to the manifest list, in `merge`), and boot-smokes the image it
  # just built on its own native runner. On a PR nothing is pushed: the matrix is a per-arch bitrot
  # guard + boot check only.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"   # linux/amd64 -> linux-amd64 (artifact-safe)
          echo "IMAGE_REF=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      # No setup-qemu-action: each arch builds on its own native runner, so there is nothing to emulate.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Image metadata (labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_REF }}

      # Build the native image and load it into the local daemon so the next step can run it. This
      # build populates the gha cache; the push-by-digest build below is then a cache hit.
      - name: Build the ${{ matrix.platform }} image (native) and load it
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ratatoskr-server:smoke
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          provenance: false
          sbom: false

      - name: Boot the image and assert /v1/health responds
        run: |
          # Plain HTTP (no cert to manage) + an unreachable ABS (connection refused is a network
          # error, which the server tolerates at startup — it degrades and /health reports it). If a
          # dependency is broken on this arch, Node fails to load it and the listener never comes up.
          docker run -d --name smoke \
            -e ALLOW_PLAIN_HTTP=true \
            -e ABS_URL=http://127.0.0.1:1 -e ABS_ALLOW_PLAIN_HTTP=true \
            -e ABS_STREAMER_API_KEY=smoke-dummy \
            -e PORT=8080 -p 8080:8080 ratatoskr-server:smoke
          ok=
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/v1/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          echo "--- container logs ---"; docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          [ -n "$ok" ] || { echo "::error title=smoke failed::the ${{ matrix.platform }} image did not serve /v1/health"; exit 1; }

      # Vulnerability gate: scan the freshly built image (this arch, on its native runner) BEFORE it
      # is pushed. A fixable HIGH/CRITICAL fails the matrix leg, which blocks merge -> E2E -> promote,
      # so a vulnerable image is never published. Runs on PRs too (the image is built + loaded there),
      # catching regressions before merge. Unfixed findings do NOT gate here — there is nothing to
      # rebuild toward yet; the scheduled image-scan.yml surfaces those in the Security tab. CVE
      # detection lives here, not in Dependabot (which only tracks base-image currency).
      # Pinned to a full commit SHA (not a tag): the March 2026 trivy-action supply-chain
      # compromise (GHSA-69fq-xp46-6x23) worked by force-pushing existing version tags to
      # malicious commits — a SHA pin is immune to that. Bump by resolving the new release
      # tag to its commit.
      - name: Scan the image for fixable HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ratatoskr-server:smoke
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # No registry write on pull_request (esp. fork PRs) — that leg only validates build + boot.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the single-arch image by digest only (no tag). `merge` collects the per-arch digests
      # into the manifest list. Cache hit off the load build above, so this re-exports, not rebuilds.
      - name: Push the ${{ matrix.platform }} image by digest
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_REF }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          provenance: false
          sbom: false

      - name: Export the digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload the digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into a single multi-arch manifest list under `testing-<sha>`, so the
  # E2E stack and promote.yml address one image. No rebuild — a pure registry-side manifest create.
  merge:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
      tag: ${{ steps.image.outputs.tag }}
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute the testing tag
        id: image
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          echo "tag=testing-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Download the per-arch digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push the manifest list, then capture its digest
        id: merge
        working-directory: /tmp/digests
        env:
          REF: ${{ steps.image.outputs.ref }}
          TAG: ${{ steps.image.outputs.tag }}
        run: |
          docker buildx imagetools create -t "${REF}:${TAG}" \
            $(printf "${REF}@sha256:%s " *)
          # The manifest-list digest is what promote.yml pins and what E2E is handed — resolve it
          # from the tag we just pushed.
          digest="$(docker buildx imagetools inspect "${REF}:${TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Published ${REF}:${TAG} (${digest})"

  # Hand the freshly pushed manifest-list image to the central E2E repo. Cross-repo dispatch needs a
  # token with access to Xexanos/ratatoskr-e2e (the per-run GITHUB_TOKEN is scoped to THIS repo
  # only), stored as the E2E_DISPATCH_TOKEN secret. If that secret is missing the job FAILS: the
  # image is published but its E2E gate silently not running would be worse than a red pipeline.
  trigger-e2e:
    needs: merge
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.trigger_e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the E2E suite
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          IMAGE: ${{ needs.merge.outputs.image }}
          TAG: ${{ needs.merge.outputs.tag }}
          DIGEST: ${{ needs.merge.outputs.digest }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$E2E_DISPATCH_TOKEN" ]; then
            echo "::error title=E2E dispatch failed::E2E_DISPATCH_TOKEN is not set — cannot trigger the E2E suite for ${IMAGE}:${TAG}. Add the secret (see docs/deploy.md)." >&2
            exit 1
          fi
          echo "Dispatching E2E for ${IMAGE}:${TAG} (${DIGEST})"
          GH_TOKEN="$E2E_DISPATCH_TOKEN" gh api \
            repos/${{ github.repository_owner }}/ratatoskr-e2e/dispatches \
            -f event_type=server-candidate \
            -F client_payload[image]="$IMAGE" \
            -F client_payload[tag]="$TAG" \
            -F client_payload[digest]="$DIGEST" \
            -F client_payload[sha]="$SHA"
