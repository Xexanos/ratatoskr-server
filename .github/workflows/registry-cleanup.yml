name: Registry cleanup

# Prunes throwaway per-commit server images from GHCR so the registry does not fill up with every
# build. It targets the PRIVATE testing package (ratatoskr-server-testing), where container.yml
# publishes one tag per build: testing-<sha> (the E2E artifact) — the disposable identity of a
# commit's build. Promoted images live in a SEPARATE public package (ratatoskr-server) that this
# job never touches, so it only ever deletes testing-<sha> here. (exclude-tags for release
# channels is kept as defense-in-depth, though the testing package never carries them.)
#
# Inspired by ratatoskr-app's release-validation.yml scheduled prune (14-day window,
# keep-most-recent floor, daily cron + workflow_dispatch). That prunes GitHub *releases* with
# plain gh; container images are manifest lists carrying multiple tags plus untagged platform
# children, so a GHCR-aware action is used here to avoid orphaning layers or deleting a
# manifest that a co-located release tag still points at.

on:
  # Daily, off-peak; an arbitrary minute to stay off the top-of-hour rush.
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: List what would be deleted without deleting anything
        type: boolean
        default: false

concurrency:
  # Never cancel a prune in flight, and never run two at once.
  group: registry-cleanup
  cancel-in-progress: false

permissions:
  contents: read
  # Deleting package versions needs packages: write. For a user-owned package the injected
  # GITHUB_TOKEN may lack delete rights; set the GHCR_CLEANUP_TOKEN secret (a PAT with
  # read:packages + delete:packages) to override — see docs/deploy.md.
  packages: write

jobs:
  prune-testing-images:
    name: Prune stale testing images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete testing-* images older than the retention window
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          owner: ${{ github.repository_owner }}
          package: ratatoskr-server-testing
          token: ${{ secrets.GHCR_CLEANUP_TOKEN || github.token }}
          # The disposable per-commit tag. Only images tagged like this are considered.
          delete-tags: testing-*
          # Never touch promoted release tags. A promoted manifest still carries its original
          # testing-<sha> tag, so protect the release channels AND semver versions (promote.yml can
          # publish e.g. 1.2.3) as defense-in-depth. Verify with a dry-run after the first versioned
          # promotion. Wildcards are supported by the action.
          exclude-tags: "latest,stable,[0-9]*.[0-9]*.[0-9]*,v[0-9]*.[0-9]*.[0-9]*"
          older-than: 14 days
          # Safety floor: always keep the few newest builds, so E2E has something to fetch
          # even during a quiet spell (mirrors the app repo's keep-most-recent).
          keep-n-tagged: 3
          # Sweep any manifests left dangling by earlier deletions.
          delete-ghost-images: true
          delete-partial-images: true
          dry-run: ${{ inputs.dry-run || false }}
