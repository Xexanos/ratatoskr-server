name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run generate
      - run: pnpm -r run build
      - run: pnpm -r run test:coverage
      - run: pnpm run lint
      # The fake-Sonos image build is validated (and published) by fake-sonos.yml, which is
      # path-filtered to packages/fake-sonos/** so it only runs when the fake actually changes.

  # Live-ABS integration matrix: the pinned minimum supported version, plus the moving
  # :latest tag as a deliberate drift canary so a new ABS release that breaks us turns CI
  # red instead of surfacing in production. Both legs are blocking. fail-fast is off so a
  # latest-drift failure still shows the (usually green) pinned leg for contrast.
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # This workflow is the single source of truth for the supported-minimum ABS digest
          # (no test code pins it — globalSetup uses ABS_IT_IMAGE or the current default). Bump
          # here when the minimum supported version changes.
          - name: abs-2.26.0-min
            image: ghcr.io/advplyr/audiobookshelf@sha256:16685fbba37a21d403f5390b907d286e15b3086d26527269b4ad785f71f571e5
          # Intentionally UNPINNED: this leg exists to catch upstream drift early.
          - name: abs-latest
            image: ghcr.io/advplyr/audiobookshelf:latest
    name: integration (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run generate
      # The integration tests spawn the compiled server (packages/app/dist/main.js) and talk
      # to it over real HTTP, so they need the build first.
      - run: pnpm -r run build
      - run: pnpm -r --if-present run test:integration
        env:
          ABS_IT_IMAGE: ${{ matrix.image }}

  # Commit types are load-bearing: promote.yml derives the release version from them at
  # promotion (see CLAUDE.md / docs/deploy.md). Lint every commit on the PR — PRs are
  # merge-committed, so the individual commits (not the PR title) are what the versioning
  # later reads. Rules live in commitlint.config.mjs at the repo root; commitlint runs via
  # npx with pinned versions rather than as a devDependency so the workspace install stays
  # lean and this job needs no pnpm setup. The config's `extends` resolves from the shared
  # npx prefix where both -p packages land (verified: the job lints on a fresh runner with
  # no repo node_modules).
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The PR's commits must be present locally to lint the base..head range.
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
      - name: Lint the PR's commit messages
        run: |
          npx --yes -p @commitlint/cli@21.2.1 -p @commitlint/config-conventional@21.2.0 \
            commitlint --from ${{ github.event.pull_request.base.sha }} \
                       --to ${{ github.event.pull_request.head.sha }} --verbose

  # SPEC section 6: contract/openapi.yaml is the single source of truth and must not
  # change in a breaking way within /v1 without a major version bump.
  oasdiff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - run: git fetch --depth=1 origin ${{ github.base_ref }}
      - uses: oasdiff/oasdiff-action/breaking@v0.1.5
        with:
          base: "origin/${{ github.base_ref }}:contract/openapi.yaml"
          revision: "HEAD:contract/openapi.yaml"
          fail-on: WARN
          github-token: ${{ github.token }}
