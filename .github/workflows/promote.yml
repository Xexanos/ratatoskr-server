name: Promote image

# Publishes a *tested* server image to a release channel — the second half of the flow that
# starts in container.yml. The key property: it does NOT rebuild. It copies the exact multi-arch
# manifest that E2E validated (identical bytes, addressed by digest) from the private testing
# package (ratatoskr-server-testing) into the public release package (ratatoskr-server), so what
# ships is provably what passed. Rebuilding here would risk publishing something E2E never saw.
#
# Besides the channel tags (latest, stable, ...) every promotion derives a semver version from
# the Conventional Commits since the last v* tag (feat!/BREAKING CHANGE -> major, feat -> minor,
# fix/perf -> patch). If only non-release commits (docs, chore, ci, ...) landed, no version is
# cut and the promotion just moves the channel tags. When a version IS cut, the image gets an
# immutable :<x.y.z> tag and the commit gets a v<x.y.z> git tag plus a GitHub release. The
# versioning lives HERE (not on push to main) on purpose: a version tag can only ever point at
# a commit whose image passed E2E — a red E2E run cuts no release.
#
# Triggers:
#   - repository_dispatch (type: e2e-passed) — the E2E repo fires this on a green run, passing
#     the digest (and optional channels/version) it just tested. This is the automatic path:
#     container.yml -> E2E -> (on pass) promote.yml.
#   - workflow_dispatch — manual promotion of a known-good tag/digest.

on:
  repository_dispatch:
    types: [e2e-passed]
  workflow_dispatch:
    inputs:
      source:
        description: Tested tag or digest to promote (e.g. testing-abc1234 or sha256:...)
        required: true
      channels:
        description: Comma-separated release tags to publish (e.g. latest,stable)
        default: latest
      version:
        description: Explicit version tag (e.g. 1.2.3) — skips the automatic conventional-commit versioning; image tag only, no git tag
        default: ""

permissions:
  # write on contents: the version step pushes the v<x.y.z> git tag and creates the GitHub release.
  contents: write
  packages: write

concurrency:
  # Serialize promotions: the version step reads the latest v* tag and pushes the next one — two
  # concurrent runs would compute the same version. Queue instead, and never cancel one in flight.
  group: promote
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Copy FROM the private testing package (where the tested digest lives) INTO the public release
  # package (which only ever receives promoted images).
  TESTING_IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server-testing
  RELEASE_IMAGE_NAME: ${{ github.repository_owner }}/ratatoskr-server

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags: the version step walks the conventional commits since the last
          # v* tag to derive the next version.
          fetch-depth: 0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve source and target tags
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_SOURCE: ${{ github.event.client_payload.digest }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          DISPATCH_CHANNELS: ${{ github.event.client_payload.channels }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_SOURCE: ${{ inputs.source }}
          INPUT_CHANNELS: ${{ inputs.channels }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          testing="${REGISTRY}/${TESTING_IMAGE_NAME,,}"
          release="${REGISTRY}/${RELEASE_IMAGE_NAME,,}"

          if [ "$EVENT" = "repository_dispatch" ]; then
            source="${DISPATCH_SOURCE:-$DISPATCH_TAG}"
            channels="${DISPATCH_CHANNELS:-latest}"
            version="${DISPATCH_VERSION:-}"
          else
            source="$INPUT_SOURCE"
            channels="${INPUT_CHANNELS:-latest}"
            version="$INPUT_VERSION"
          fi

          if [ -z "$source" ]; then
            echo "::error::No source tag/digest to promote."
            exit 1
          fi

          # The tested bytes live in the TESTING package; a digest addresses them exactly, a bare
          # tag (e.g. testing-abc1234) is resolved there too.
          case "$source" in
            sha256:*) srcref="${testing}@${source}" ;;
            *)        srcref="${testing}:${source}" ;;
          esac

          echo "image=${release}" >> "$GITHUB_OUTPUT"   # promote INTO the public release package
          echo "srcref=${srcref}" >> "$GITHUB_OUTPUT"    # FROM the private testing package
          echo "channels=${channels}" >> "$GITHUB_OUTPUT"
          echo "explicit_version=${version}" >> "$GITHUB_OUTPUT"

      - name: Determine the release version
        id: version
        env:
          SRCREF: ${{ steps.plan.outputs.srcref }}
          EXPLICIT: ${{ steps.plan.outputs.explicit_version }}
        run: |
          set -euo pipefail

          # Emit the step outputs in one place; release=true means "an auto-derived version
          # applies to this promotion" — the final step then ensures git tag and GitHub release
          # exist (idempotently: a re-promotion of the same commit also repairs a run that
          # earlier died between tag push and release creation).
          finish() { # $1=version $2=release
            echo "version=$1" >> "$GITHUB_OUTPUT"
            echo "release=$2" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ -n "$EXPLICIT" ]; then
            echo "Explicit version ${EXPLICIT} given — skipping auto-versioning (image tag only)."
            finish "$EXPLICIT" false
          fi

          # The build stamped the full commit into the image (metadata-action's
          # org.opencontainers.image.revision label); read it back so the version is computed for
          # exactly the commit whose bytes are being promoted — no reliance on the dispatch payload.
          sha="$(docker buildx imagetools inspect "$SRCREF" --format '{{json .Image}}' \
            | jq -r '[.. | objects | select(has("Labels")) | .Labels["org.opencontainers.image.revision"] // empty] | unique | join(" ")')"

          case "$sha" in
            "" | *" "*)
              echo "::warning::No unique org.opencontainers.image.revision label on ${SRCREF} (got: '${sha}') — promoting channels only, no version."
              finish "" false ;;
          esac
          if ! git cat-file -e "${sha}^{commit}" 2>/dev/null; then
            echo "::warning::Image revision ${sha} is not a commit in this repository — promoting channels only, no version."
            finish "" false
          fi
          # Versions come from main history only. A manually promoted feature-branch image still
          # gets its channel tags, just no version. (HEAD is main for both trigger types: the
          # default branch for repository_dispatch, and promote runs are not dispatched on branches.)
          if ! git merge-base --is-ancestor "$sha" HEAD; then
            echo "::notice::Commit ${sha} is not on main — promoting channels only, no version."
            finish "" false
          fi

          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

          # Re-promotion of an already-released commit (e.g. latest -> stable): reuse its
          # version. release=true so the final step can repair a missing GitHub release.
          existing="$(git tag --list 'v[0-9]*' --points-at "$sha" | sort -V | tail -n1)"
          if [ -n "$existing" ]; then
            echo "Commit ${sha} is already released as ${existing} — reusing that version."
            finish "${existing#v}" true
          fi
          # Out-of-order E2E completions: a newer commit that CONTAINS this one was already
          # released, so these changes shipped in that version — cutting another one would number
          # releases backwards. Channel tags still move (caveat: latest then points at the older
          # bytes; promote the newer digest again to fix, or avoid promoting stale digests).
          if [ -n "$(git tag --list 'v[0-9]*' --contains "$sha")" ]; then
            echo "::notice::Commit ${sha} is already contained in a newer release — promoting channels only, no version."
            finish "" false
          fi

          # Conventional-commit bump over the range since the last released version. The base
          # is the HIGHEST v* tag reachable from the promoted commit (sort -V) — the same
          # selection the reuse check above uses; `git describe` (nearest by topology) could
          # pick a lower base on branched history and mint a colliding version. Anything that
          # matches no rule (docs:, chore:, ci:, refactor:, merge commits, ...) does not release.
          last="$(git tag --list 'v[0-9]*' --merged "$sha" | sort -V | tail -n1)"
          range="${last:+${last}..}${sha}"
          subjects="$(git log --format='%s' "$range")"

          # Breaking changes: the `!` subject marker, or a BREAKING[ -]CHANGE: footer. The footer
          # is a commit's last body paragraph — but git/GitHub/dependabot append Co-authored-by:
          # and Signed-off-by: trailers (this repo's convention adds a Co-Authored-By: line after
          # a blank line, see CLAUDE.md), which would otherwise become the last paragraph and hide
          # a real footer. So drop that trailing trailer/blank-line tail first, then take the last
          # paragraph. A "BREAKING CHANGE:" quoted mid-body (e.g. a deps: commit pasting an
          # upstream changelog) still does not count.
          breaking=false
          if grep -qE '^[a-z]+(\([^)]*\))?!:' <<< "$subjects"; then
            breaking=true
          else
            while read -r commit; do
              footer="$(git log -1 --format='%b' "$commit" | awk '
                { line[NR] = $0 }
                END {
                  n = NR
                  while (n > 0 && (line[n] ~ /^[[:space:]]*$/ ||
                        tolower(line[n]) ~ /^(co-authored-by|signed-off-by):/)) n--
                  start = n
                  while (start > 1 && line[start-1] !~ /^[[:space:]]*$/) start--
                  for (i = start; i <= n; i++) print line[i]
                }')"
              if grep -qE '^BREAKING[ -]CHANGE:' <<< "$footer"; then
                breaking=true
                break
              fi
            done < <(git rev-list "$range")
          fi

          bump="none"
          if [ "$breaking" = true ]; then
            bump="major"
          elif grep -qE '^feat(\([^)]*\))?:' <<< "$subjects"; then
            bump="minor"
          elif grep -qE '^(fix|perf)(\([^)]*\))?:' <<< "$subjects"; then
            bump="patch"
          fi

          if [ "$bump" = "none" ]; then
            echo "::notice::No release-worthy commits (feat/fix/perf/breaking) since ${last:-the beginning} — promoting channels only, no version."
            finish "" false
          fi

          base="${last:-v0.0.0}"; base="${base#v}"
          IFS=. read -r major minor patch <<< "$base"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          version="${major}.${minor}.${patch}"

          echo "Next version: ${version} (${bump} bump from ${last:-nothing}, commit ${sha})"
          finish "$version" true

      - name: Re-tag the tested manifest onto the release channels
        env:
          IMAGE: ${{ steps.plan.outputs.image }}
          SRCREF: ${{ steps.plan.outputs.srcref }}
          CHANNELS: ${{ steps.plan.outputs.channels }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # The version, if any, becomes an extra immutable channel.
          [ -n "$VERSION" ] && CHANNELS="${CHANNELS},${VERSION}"
          echo "Promoting ${SRCREF} -> ${CHANNELS}"
          targets=""
          IFS=',' read -ra chans <<< "$CHANNELS"
          for ch in "${chans[@]}"; do
            ch="$(echo "$ch" | xargs)"   # trim
            [ -n "$ch" ] || continue
            targets="${targets} --tag ${IMAGE}:${ch}"
          done
          # imagetools copies the multi-arch manifest referenced by SRCREF under each new tag,
          # without pulling or rebuilding layers — a pure server-side re-tag of the tested bytes.
          docker buildx imagetools create ${targets} "${SRCREF}"
          echo "Published: ${targets}"

      # Runs AFTER the image publish so a failed promotion never leaves a version tag with no
      # image behind it. Each part is idempotent (create tag if missing, push is a no-op when
      # the remote has it, create release if missing), so a re-promotion of the same commit
      # repairs a run that earlier died between tag push and release creation. Tags pushed
      # with GITHUB_TOKEN do not trigger other workflows — no loops.
      - name: Ensure the version tag and GitHub release exist
        if: steps.version.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.version.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! git rev-parse -q --verify "refs/tags/v${VERSION}" > /dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v${VERSION}" -m "Release v${VERSION}" "${SHA}"
          fi
          # No-op if the remote already has the tag; fails loudly if it points elsewhere.
          git push origin "v${VERSION}"
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists."
          else
            # Release notes are generated from the commits since the previous release.
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes --verify-tag
          fi
